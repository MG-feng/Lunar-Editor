name: Build Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.1.0)'
        required: true
        type: string
      branch:
        description: 'Branch to build from'
        required: false
        default: 'main'
        type: string

jobs:
  build-release:
    name: Build Release ${{ github.event.inputs.version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: lunar-editor.exe
            archive: lunar-editor-windows-${{ github.event.inputs.version }}.zip
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: lunar-editor
            archive: lunar-editor-linux-${{ github.event.inputs.version }}.tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: lunar-editor
            archive: lunar-editor-macos-${{ github.event.inputs.version }}.tar.gz

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.inputs.branch }}

    - name: Setup Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        target: ${{ matrix.target }}
        override: true
        profile: minimal

    - name: Cache cargo registry
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Install Linux dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libxcb-shape0-dev \
          libxcb-xfixes0-dev \
          libxcb1-dev \
          libx11-dev \
          libgl1-mesa-dev \
          libgles2-mesa-dev \
          libegl1-mesa-dev \
          libwayland-dev \
          libxkbcommon-dev \
          libdbus-1-dev \
          libgtk-3-dev

    - name: Build Release
      uses: actions-rs/cargo@v1
      with:
        command: build
        args: --release --target ${{ matrix.target }}

    - name: Prepare artifacts (Windows)
      if: runner.os == 'Windows'
      run: |
        mkdir artifacts
        copy target\${{ matrix.target }}\release\${{ matrix.artifact }} artifacts\
        cd artifacts
        compress-archive -Path * -DestinationPath ${{ matrix.archive }}

    - name: Prepare artifacts (Unix)
      if: runner.os != 'Windows'
      run: |
        mkdir -p artifacts
        cp target/${{ matrix.target }}/release/${{ matrix.artifact }} artifacts/
        cd artifacts
        tar -czf ${{ matrix.archive }} *

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.os }}-${{ github.event.inputs.version }}
        path: artifacts/*.${{ matrix.os == 'windows-latest' && 'zip' || 'tar.gz' }}
        retention-days: 90

  create-release:
    name: Create GitHub Release
    needs: build-release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        name: Lunar Editor ${{ github.event.inputs.version }}
        tag_name: ${{ github.event.inputs.version }}
        files: artifacts/**/*.zip
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
